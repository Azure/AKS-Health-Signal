---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: upgradeoperations.upgrade.aks.io
spec:
  group: upgrade.aks.io
  names:
    kind: UpgradeOperation
    listKind: UpgradeOperationList
    plural: upgradeoperations
    shortNames:
    - uo
    singular: upgradeoperation
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          UpgradeOperation is the Schema for the upgradeoperations API.


          Created by the AKS Resource Provider to represent one or more in-progress
          upgrade targets on a cluster. Cluster and node-pool targets may coexist in
          the same UpgradeOperation, but each target may have at most one active
          UpgradeOperation at a time.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec is the list of upgrade targets carried by this operation.
            items:
              description: UpgradeOperationSpec defines the desired state of an UpgradeOperation.
              properties:
                targetNames:
                  description: |-
                    TargetNames are the names of the upgrade targets.
                    For Cluster upgrades this list contains the cluster name; for NodePool
                    upgrades this list contains one or more node pool names.
                  items:
                    type: string
                  minItems: 1
                  type: array
                  x-kubernetes-list-type: set
                type:
                  description: 'Type indicates the upgrade type: Cluster or NodePool.'
                  enum:
                  - Cluster
                  - NodePool
                  type: string
              required:
              - targetNames
              - type
              type: object
              x-kubernetes-validations:
              - message: cluster upgrades must target exactly one cluster name
                rule: self.type != 'Cluster' || size(self.targetNames) == 1
              - message: targetNames entries must be non-empty
                rule: self.targetNames.all(target, size(target) > 0)
            minItems: 1
            type: array
            x-kubernetes-list-map-keys:
            - type
            x-kubernetes-list-type: map
            x-kubernetes-validations:
            - message: at most one cluster entry is allowed
              rule: self.filter(item, item.type == 'Cluster').size() <= 1
        required:
        - spec
        type: object
    served: true
    storage: true
